<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta Bancária</title>
</head>
<body>

    <h1>Cadastro de Contas</h1>

    <label>Nome do Correntista:</label>
    <input type="text" id="nomeCorrentista">

    <br><br>

    <label>Banco:</label>
    <input type="text" id="banco">

    <br><br>

    <label>Número da Conta:</label>
    <input type="text" id="numero">

    <br><br>

    <label>Saldo:</label>
    <input type="number" id="saldo">

    <br><br>

    <label>Saldo Especial (Conta Corrente):</label>
    <input type="number" id="saldoEspecial">

    <br><br>

    <label>Juros (Poupança):</label>
    <input type="number" id="juros">

    <br><br>

    <label>Data de Vencimento:</label>
    <input type="date" id="vencimento">

    <br><br>

    <button onclick="mostrarDados()">Mostrar Dados</button>

    <div id="resultado"></div>

    <script src="Conta Bancária.js"></script>

</body>
</html>
